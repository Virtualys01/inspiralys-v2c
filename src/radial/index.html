<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Radial Menu</title>
        <style>
            html,
            body,
            #root {
                background: transparent !important;
                margin: 0;
                padding: 0;
                overflow: hidden;
                width: 100vw;
                height: 100vh;
            }
        </style>
    </head>
    <body class="m-0 p-0 bg-transparent">
        <div id="root"></div>
        <script>
            // Safety escape — works even if React hasn't loaded
            document.addEventListener('keydown', async (e) => {
                if (e.key === 'Escape') {
                    try {
                        const { invoke } = await import('@tauri-apps/api/core');
                        await invoke('hide_radial_menu');
                    } catch { window.close(); }
                }
            });
        </script>
        <script type="module" src="./main.tsx"></script>
    </body>
</html>
